<!DOCTYPE html>
<html>

<head>
    <title>ID Card Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

    <h2>Scan Student ID Card</h2>

    <div id="reader"></div>
    <p id="result">Scan Result: </p>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById("result").innerText = "Scanned ID: " + decodedText;

            // 👉 Backendக்கு send பண்ணலாம்
            fetch("iddetail.html", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ studentId: decodedText })
            })
                .then(res => res.text())
                .then(data => console.log(data));
        }

        function onScanError(errorMessage) {
            // optional
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 10, qrbox: 250 }
        );

        html5QrcodeScanner.render(onScanSuccess, onScanError);
    </script>

</body>

</html>
